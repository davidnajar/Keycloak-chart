{{/*
Bridge secret so the Keycloak CR can reference a predictable secret name
regardless of whether the password is static or operator-generated.

When keycloakDbSecret.password is set, the chart creates the secret directly.
When it is empty, we create a secret that copies the value from the
Zalando-operator-generated credential secret using a lookup.
Note: the lookup only works during `helm upgrade --install` against a live
cluster; on `helm template` it returns an empty map.
*/}}
{{- $ns := include "keycloak-custom.namespace" . }}
{{- $zalandoSecret := include "keycloak-custom.zalandoCredentialSecret" . }}
{{- $existingZalandoSecret := (lookup "v1" "Secret" $ns $zalandoSecret) }}
{{- $password := .Values.keycloakDbSecret.password }}
{{- if and (not $password) $existingZalandoSecret }}
  {{- $password = index $existingZalandoSecret.data "password" | b64dec }}
{{- end }}
{{- if not $password }}
  {{/* Fallback placeholder – operator secret not yet available (e.g. helm template) */}}
  {{- $password = "REPLACE_WITH_OPERATOR_SECRET" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.keycloakDbSecret.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "keycloak-custom.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ $password | quote }}
  username: {{ .Values.postgresql.user | quote }}
  host: >-
    {{ include "keycloak-custom.postgresClusterName" . }}.{{ $ns }}.svc.cluster.local
  port: "5432"
  database: {{ .Values.postgresql.database | quote }}
