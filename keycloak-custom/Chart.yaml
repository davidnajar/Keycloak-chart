apiVersion: v2
name: keycloak-custom
description: >
  A Helm chart that integrates the official Keycloak Operator with the
  Zalando Postgres Operator, providing a production-ready Keycloak deployment
  backed by a managed PostgreSQL cluster.
type: application
version: 0.1.0
appVersion: "26.0.0"
keywords:
  - keycloak
  - identity
  - iam
  - sso
  - postgres
  - operator
home: https://www.keycloak.org
sources:
  - https://github.com/keycloak/keycloak-k8s-resources
  - https://github.com/zalando/postgres-operator
maintainers:
  - name: davidnajar
dependencies:
  - name: keycloak-operator
    version: "26.0.0"
    repository: "oci://quay.io/keycloak"
    condition: keycloak-operator.enabled
  - name: postgres-operator
    version: "1.12.2"
    repository: "https://opensource.zalando.com/postgres-operator/charts/postgres-operator"
    condition: postgres-operator.enabled
